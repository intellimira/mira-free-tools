    <script>
        function calculateScore() {
            const details = [
                document.getElementById('detail1').value,
                document.getElementById('detail2').value,
                document.getElementById('detail3').value,
                document.getElementById('detail4').value,
                document.getElementById('detail5').value
            ];

            let score = 0;
            details.forEach(detail => {
                if (detail.toLowerCase().includes('compliant')) {
                    score += 20;
                } else if (detail.toLowerCase().includes('non-compliant')) {
                    score -= 20;
                }
            });

            score = Math.max(0, Math.min(100, score));
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = score >= 80 ? 'Great job!' : score >= 50 ? 'Good effort.' : 'Needs improvement.';
        }
    </script>
