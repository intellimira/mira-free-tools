        <h1>SaaS Metrics Dashboard Calculator</h1>
        <form id="metricsForm">
            <label for="mrr">MRR:</label>
            <input type="number" id="mrr" required>
            <label for="churn">Churn Rate:</label>
            <input type="number" id="churn" required>

    <script>
        document.getElementById('metricsForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const mrr = parseFloat(document.getElementById('mrr').value);
            const churn = parseFloat(document.getElementById('churn').value);
            const users = parseFloat(document.getElementById('users').value);
            const score = calculateScore(mrr, churn, users);
            displayScore(score);
        });

        function calculateScore(mrr, churn, users) {
            const churnRate = churn / 100;
            const avgMrrPerUser = mrr / users;
            return (avgMrrPerUser * (1 - churnRate)) / (mrr / users);
        }

        function displayScore(score) {
            const resultDiv = document.getElementById('result');
            const feedbackDiv = document.getElementById('feedback');
            resultDiv.textContent = score.toFixed(2);
            if (score >= 0.5) {
                feedbackDiv.textContent = 'Good!';
                feedbackDiv.style.color = '#28a745';
            } else {
                feedbackDiv.textContent = 'Improve!';
                feedbackDiv.style.color = '#dc3545';
            }
        }
    </script>
