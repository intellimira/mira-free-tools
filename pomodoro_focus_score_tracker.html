  <form id="focusForm">
    <label for="sessions">Number of Sessions:</label>

    <label for="minutes">Total Minutes Worked:</label>

<script>
  document.getElementById('focusForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const sessions = parseInt(document.getElementById('sessions').value);
    const minutes = parseInt(document.getElementById('minutes').value);
    const score = Math.round((minutes / sessions) * 10) / 10;
    document.getElementById('score').innerText = score;
    let feedback = '';
    if (score >= 9) {
      feedback = 'Excellent focus!';
    } else if (score >= 7) {
      feedback = 'Good focus!';
    } else if (score >= 5) {
      feedback = 'Moderate focus.';
    } else {
      feedback = 'Low focus. Need more practice!';
    }
    document.getElementById('feedback').innerText = feedback;
  });
</script>
