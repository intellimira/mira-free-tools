  <h1>E-Commerce Shipping Cost Estimator</h1>
  <form id="shippingForm">
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weight" required>
    <label for="distance">Distance (km):</label>
    <input type="number" id="distance" required>
    <label for="zone">Zone:</label>
    <select id="zone" required>
      <option value="zone1">Zone 1</option>

<script>
  function calculateShipping() {
    const weight = parseFloat(document.getElementById('weight').value);
    const distance = parseFloat(document.getElementById('distance').value);
    const zone = document.getElementById('zone').value;

    if (isNaN(weight) || isNaN(distance)) {
      document.getElementById('result').innerText = 'Please enter valid weight and distance.';
      return;
    }

    let cost = 0;
    if (zone === 'zone1') {
      cost = weight * distance * 2;
    } else if (zone === 'zone2') {
      cost = weight * distance * 3;
    } else if (zone === 'zone3') {
      cost = weight * distance * 4;
    }

    const resultElement = document.getElementById('result');
    if (cost > 0) {
      resultElement.innerText = 'Estimated Shipping Cost: $' + cost.toFixed(2);
      resultElement.style.color = '#5cb85c';
    } else {
      resultElement.innerText = 'Invalid input. Please try again.';
      resultElement.style.color = '#d9534f';
    }
  }
</script>
