<script>
  function calculateHealth() {
    const memberCount = parseInt(document.getElementById('memberCount').value) || 0;
    const activity = parseInt(document.getElementById('activity').value) || 0;
    const total = memberCount + activity;
    const score = (total / (100 + 1000)) * 100;
    const healthScore = document.getElementById('healthScore');
    if (score >= 80) {
      healthScore.classList.add('healthy');
      healthScore.classList.remove('unhealthy');
    } else {
      healthScore.classList.add('unhealthy');
      healthScore.classList.remove('healthy');
    }
    healthScore.textContent = 'Health Score: ' + score.toFixed(2);
  }
</script>
