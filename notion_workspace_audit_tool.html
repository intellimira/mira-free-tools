    <script>
        document.getElementById('pages').addEventListener('input', calculateScore);
        document.getElementById('templates').addEventListener('input', calculateScore);
        document.getElementById('blocks').addEventListener('input', calculateScore);
        document.getElementById('integrations').addEventListener('input', calculateScore);
        document.getElementById('users').addEventListener('input', calculateScore);

        function calculateScore() {
            const pages = parseInt(document.getElementById('pages').value) || 0;
            const templates = parseInt(document.getElementById('templates').value) || 0;
            const blocks = parseInt(document.getElementById('blocks').value) || 0;
            const integrations = parseInt(document.getElementById('integrations').value) || 0;
            const users = parseInt(document.getElementById('users').value) || 0;

            let score = 0;

            if (pages <= 100) score += 5;
            if (pages > 100 && pages <= 500) score += 10;
            if (pages > 500) score += 15;

            if (templates <= 10) score += 3;
            if (templates > 10 && templates <= 50) score += 6;
            if (templates > 50) score += 9;

            if (blocks <= 500) score += 2;
            if (blocks > 500 && blocks <= 1000) score += 4;
            if (blocks > 1000) score += 6;

            if (integrations <= 5) score += 4;
            if (integrations > 5 && integrations <= 15) score += 6;
            if (integrations > 15) score += 8;

            if (users <= 5) score += 1;
            if (users > 5 && users <= 10) score += 2;
            if (users > 10) score += 3;

            document.getElementById('score').textContent = score;
        }
    </script>
