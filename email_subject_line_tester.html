    <script>
        function calculateScore() {
            const subject = document.getElementById('subjectLine').value;
            let score = 0;

            if (subject.length >= 5 && subject.length <= 50) score += 10;
            if (subject.includes('free')) score += 15;
            if (subject.includes('limited time')) score += 10;
            if (subject.includes('winner')) score += 15;
            if (subject.includes('exclusive')) score += 10;

            const scoreDisplay = document.getElementById('scoreDisplay');
            const text = 'Open Rate Prediction: ' + score + '%';
            if (score >= 60) {
                scoreDisplay.textContent = text;
                scoreDisplay.classList.add('high');
                scoreDisplay.classList.remove('low');
            } else {
                scoreDisplay.textContent = text;
                scoreDisplay.classList.add('low');
                scoreDisplay.classList.remove('high');
            }
        }
    </script>
