    <script>
        function calculateScore() {
            const message = document.getElementById('message').value;
            let score = 0;
            if (message.includes('value')) score += 2;
            if (message.includes('network')) score += 2;
            if (message.includes('mutual')) score += 2;
            if (message.includes('introduction')) score += 2;
            if (message.includes('benefits')) score += 2;

            const scoreDisplay = document.getElementById('score');
            scoreDisplay.classList.remove('good', 'bad');
            if (score >= 8) {
                scoreDisplay.textContent = 'Acceptance Rate Prediction: ' + score + '/10 - Good';
                scoreDisplay.classList.add('good');
            } else if (score >= 4) {
                scoreDisplay.textContent = 'Acceptance Rate Prediction: ' + score + '/10 - Neutral';
            } else {
                scoreDisplay.textContent = 'Acceptance Rate Prediction: ' + score + '/10 - Bad';
                scoreDisplay.classList.add('bad');
            }
        }
    </script>
