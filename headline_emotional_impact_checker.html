    <script>
        function checkEmotionalImpact() {
            const headline = document.getElementById('headline').value;
            const score = calculateEmotionalImpact(headline);
            document.getElementById('score').innerText = 'Emotional Impact Score: ' + score;
            document.getElementById('feedback').innerText = getFeedback(score);
        }

        function calculateEmotionalImpact(headline) {
            const positiveWords = ['exciting', 'amazing', 'incredible', 'fantastic', 'wonderful'];
            const negativeWords = ['boring', 'terrible', 'horrible', 'awful', 'disappointing'];
            let score = 0;
            const words = headline.split(' ');
            words.forEach(function(word) {
                if (positiveWords.includes(word.toLowerCase())) score++;
                if (negativeWords.includes(word.toLowerCase())) score--;
            });
            return Math.max(0, Math.min(100, score));
        }

        function getFeedback(score) {
            if (score >= 80) return 'Very High Impact';
            if (score >= 60) return 'High Impact';
            if (score >= 40) return 'Moderate Impact';
            if (score >= 20) return 'Low Impact';
            return 'Very Low Impact';
        }
    </script>
